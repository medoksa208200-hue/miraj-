<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم — معراج التشييد</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&family=Almarai:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --navy:#08152E;--navy2:#0D1F42;--navy3:#122554;
  --blue:#1558D6;--blue2:#1A6BF5;--sky:#60A5FA;
  --white:#FFFFFF;--gray:#8FA3C0;--gray2:#B8CADE;
}
html,body{height:100%;font-family:'Almarai',sans-serif;}
body{
  background:var(--navy);
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;overflow:hidden;
  position:relative;
}

/* background shapes */
.bg{position:fixed;inset:0;overflow:hidden;pointer-events:none;z-index:0;}
.bg-grid{
  position:absolute;inset:0;
  background-image:linear-gradient(rgba(21,88,214,.05) 1px,transparent 1px),
    linear-gradient(90deg,rgba(21,88,214,.05) 1px,transparent 1px);
  background-size:60px 60px;
}
.bg-glow{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:800px;height:800px;border-radius:50%;
  background:radial-gradient(ellipse,rgba(21,88,214,.12) 0%,transparent 70%);
}
.bg-circle{
  position:absolute;border-radius:50%;
  border:1px solid rgba(21,88,214,.12);
}
.bg-circle.c1{width:700px;height:700px;top:-200px;right:-200px;animation:spin 50s linear infinite;}
.bg-circle.c2{width:500px;height:500px;bottom:-150px;left:-150px;border-color:rgba(96,165,250,.08);animation:spin 35s linear infinite reverse;}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}

/* card */
.card{
  position:relative;z-index:1;
  background:rgba(13,31,66,0.85);
  border:1px solid rgba(255,255,255,.08);
  border-radius:20px;
  padding:2.5rem 2.2rem;
  width:100%;max-width:420px;
  backdrop-filter:blur(20px);
  box-shadow:0 24px 80px rgba(0,0,0,.5);
  animation:fadeUp .6s ease forwards;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

/* logo */
.logo-wrap{display:flex;flex-direction:column;align-items:center;gap:.6rem;margin-bottom:2rem;}
.logo-icon{
  width:64px;height:64px;
  background:rgba(21,88,214,.15);
  border:1px solid rgba(21,88,214,.3);
  border-radius:16px;
  display:flex;align-items:center;justify-content:center;
}
.logo-name{font-family:'Tajawal',sans-serif;font-size:1.2rem;font-weight:700;color:var(--white);}
.logo-sub{font-size:.72rem;color:var(--sky);letter-spacing:1px;font-weight:300;}

/* badge */
.admin-badge{
  display:inline-flex;align-items:center;gap:.5rem;
  background:rgba(21,88,214,.12);border:1px solid rgba(21,88,214,.25);
  color:var(--sky);font-size:.7rem;letter-spacing:1.5px;
  padding:.28rem .8rem;border-radius:20px;margin-bottom:1.6rem;
}
.admin-badge::before{content:'';width:5px;height:5px;background:var(--sky);border-radius:50%;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* form */
.form-group{margin-bottom:1rem;}
.form-label{display:block;font-size:.72rem;color:var(--gray);letter-spacing:.5px;margin-bottom:.4rem;}
.form-input{
  width:100%;background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.1);
  color:var(--white);padding:.75rem 1rem;
  border-radius:10px;font-family:'Almarai',sans-serif;
  font-size:.9rem;outline:none;transition:all .25s;
}
.form-input:focus{border-color:var(--blue2);background:rgba(21,88,214,.08);}
.form-input::placeholder{color:rgba(255,255,255,.25);}

/* error */
.error-box{
  background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);
  color:#FCA5A5;font-size:.78rem;padding:.6rem .9rem;border-radius:8px;
  margin-bottom:1rem;display:none;text-align:center;
}

/* btn */
.btn-login{
  width:100%;background:var(--blue);color:var(--white);border:none;
  padding:.85rem;border-radius:10px;font-family:'Almarai',sans-serif;
  font-size:.95rem;font-weight:700;cursor:pointer;
  box-shadow:0 4px 20px rgba(21,88,214,.45);
  transition:all .25s;margin-bottom:.8rem;
}
.btn-login:hover{background:var(--blue2);transform:translateY(-1px);box-shadow:0 8px 28px rgba(21,88,214,.55);}
.btn-login:active{transform:translateY(0);}
.btn-login:disabled{opacity:.6;cursor:not-allowed;transform:none;}

/* divider */
.divider{display:flex;align-items:center;gap:.8rem;margin:.2rem 0 .8rem;}
.divider-line{flex:1;height:1px;background:rgba(255,255,255,.08);}
.divider-text{font-size:.7rem;color:var(--gray);}

/* google btn */
.btn-google{
  width:100%;background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.1);color:var(--white);
  padding:.75rem;border-radius:10px;font-family:'Almarai',sans-serif;
  font-size:.85rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:.6rem;
  transition:all .25s;
}
.btn-google:hover{background:rgba(255,255,255,.08);border-color:rgba(96,165,250,.3);}

/* back link */
.back-link{
  display:flex;align-items:center;justify-content:center;gap:.4rem;
  margin-top:1.4rem;font-size:.75rem;color:var(--gray);
  text-decoration:none;transition:color .2s;
}
.back-link:hover{color:var(--sky);}

/* loading spinner */
.spinner{
  display:inline-block;width:16px;height:16px;
  border:2px solid rgba(255,255,255,.3);
  border-top-color:var(--white);border-radius:50%;
  animation:spin .7s linear infinite;vertical-align:middle;margin-left:.5rem;
}

/* success state */
.success-wrap{
  display:none;flex-direction:column;align-items:center;
  gap:1rem;padding:1rem 0;text-align:center;
}
.success-icon{
  width:64px;height:64px;background:rgba(34,197,94,.15);
  border:1px solid rgba(34,197,94,.3);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:1.8rem;animation:popIn .4s ease;
}
@keyframes popIn{from{transform:scale(0)}to{transform:scale(1)}}
.success-text{font-size:1rem;font-weight:700;color:var(--white);}
.success-sub{font-size:.8rem;color:var(--gray);font-weight:300;}
</style>
</head>
<body>

<div class="bg">
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>
  <div class="bg-circle c1"></div>
  <div class="bg-circle c2"></div>
</div>

<div class="card">

  <!-- Logo -->
  <div class="logo-wrap">
    <div class="logo-icon">
      <svg width="36" height="42" viewBox="0 0 60 70" fill="none">
        <polygon points="30,3 54,17 30,31 6,17" fill="none" stroke="#60A5FA" stroke-width="1.5"/>
        <polygon points="30,13 43,20 30,27 17,20" fill="white" fill-opacity="0.85"/>
        <rect x="6" y="36" width="10" height="28" rx="1" fill="#1558D6"/>
        <rect x="44" y="36" width="10" height="28" rx="1" fill="#1558D6"/>
        <path d="M16,36 L30,48 L44,36" stroke="#1558D6" stroke-width="10" stroke-linejoin="round" fill="none"/>
        <rect x="22" y="50" width="16" height="14" rx="1" fill="#1558D6"/>
      </svg>
    </div>
    <div class="logo-name">معراج التشييد</div>
    <div class="logo-sub">للمقاولات العامة</div>
  </div>

  <div style="text-align:center">
    <div class="admin-badge">🔐 &nbsp;دخول الأدمن فقط</div>
  </div>

  <!-- Error -->
  <div class="error-box" id="errorBox">بيانات غير صحيحة. حاول مرة أخرى.</div>

  <!-- Login Form -->
  <div id="loginForm">
    <div class="form-group">
      <label class="form-label">البريد الإلكتروني</label>
      <input class="form-input" id="emailInput" type="email" placeholder="admin@mirajaltasheed.com" autocomplete="username">
    </div>
    <div class="form-group">
      <label class="form-label">كلمة المرور</label>
      <input class="form-input" id="passInput" type="password" placeholder="••••••••" autocomplete="current-password"
        onkeydown="if(event.key==='Enter') doLogin()">
    </div>

    <button class="btn-login" id="loginBtn" onclick="doLogin()">
      دخول لوحة التحكم ←
    </button>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">أو</span>
      <div class="divider-line"></div>
    </div>

    <button class="btn-google" id="googleBtn" onclick="doGoogleLogin()">
      <svg width="18" height="18" viewBox="0 0 48 48">
        <path fill="#FFC107" d="M43.6 20H24v8h11.3C33.7 33.2 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.7 1.1 7.8 2.9l5.7-5.7C34.1 6.5 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 20-8.9 20-20 0-1.3-.1-2.7-.4-4z"/>
        <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.5 16 19 13 24 13c3 0 5.7 1.1 7.8 2.9l5.7-5.7C34.1 6.5 29.3 4 24 4 16.3 4 9.7 8.4 6.3 14.7z"/>
        <path fill="#4CAF50" d="M24 44c5.2 0 9.9-1.9 13.5-5l-6.2-5.2C29.5 35.5 26.9 36 24 36c-5.2 0-9.7-2.9-11.9-7.1l-6.5 5C9.5 39.4 16.3 44 24 44z"/>
        <path fill="#1976D2" d="M43.6 20H24v8h11.3c-.9 2.5-2.6 4.6-4.8 6l6.2 5.2C40.2 35.8 44 30.3 44 24c0-1.3-.1-2.7-.4-4z"/>
      </svg>
      دخول بحساب جوجل
    </button>
  </div>

  <!-- Success State -->
  <div class="success-wrap" id="successWrap">
    <div class="success-icon">✓</div>
    <div class="success-text">تم تسجيل الدخول بنجاح!</div>
    <div class="success-sub">جاري تحويلك للموقع...</div>
  </div>

  <a href="/" class="back-link">← العودة للموقع</a>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey:"AIzaSyCz2sWEsTKTrhbYWy-ql_Y6GTe1yY-M1t0",
  authDomain:"mierag.firebaseapp.com",
  projectId:"mierag",
  storageBucket:"mierag.firebasestorage.app",
  messagingSenderId:"833699151523",
  appId:"1:833699151523:web:6ef3933f6fcb778c0e0916"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// If already logged in → go to site
auth.onAuthStateChanged(user => {
  if (user) showSuccess();
});

function setLoading(loading) {
  const btn = document.getElementById('loginBtn');
  const gBtn = document.getElementById('googleBtn');
  btn.disabled = loading;
  gBtn.disabled = loading;
  btn.innerHTML = loading
    ? 'جاري الدخول...<span class="spinner"></span>'
    : 'دخول لوحة التحكم ←';
}

function showError(msg) {
  const el = document.getElementById('errorBox');
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 4000);
}

function showSuccess() {
  document.getElementById('loginForm').style.display = 'none';
  document.getElementById('errorBox').style.display = 'none';
  const sw = document.getElementById('successWrap');
  sw.style.display = 'flex';
  setTimeout(() => {
    window.location.href = '/?admin=1';
  }, 1500);
}

async function doLogin() {
  const email = document.getElementById('emailInput').value.trim();
  const pass  = document.getElementById('passInput').value;
  if (!email || !pass) { showError('أدخل البريد وكلمة المرور'); return; }
  setLoading(true);
  try {
    await auth.signInWithEmailAndPassword(email, pass);
    showSuccess();
  } catch(e) {
    setLoading(false);
    showError('بيانات غير صحيحة. تأكد من البريد وكلمة المرور.');
  }
}

async function doGoogleLogin() {
  const provider = new firebase.auth.GoogleAuthProvider();
  try {
    await auth.signInWithPopup(provider);
    showSuccess();
  } catch(e) {
    showError('فشل تسجيل الدخول بجوجل. حاول مرة أخرى.');
  }
}
</script>
</body>
</html>
